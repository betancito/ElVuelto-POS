<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso Administrativo - El Vuelto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Noto+Serif:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#faf3e8",
                    "secondary-container": "#fecea5",
                    "secondary-fixed-dim": "#ecbe95",
                    "secondary-fixed": "#ffdcbf",
                    "secondary": "#7a5736",
                    "primary-fixed": "#ffdbcd",
                    "inverse-primary": "#ffb596",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#5f4021",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#fff8f0",
                    "on-error": "#ffffff",
                    "outline": "#89726a",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e8e2d7",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#002114",
                    "tertiary-fixed-dim": "#95d4b3",
                    "on-tertiary-fixed-variant": "#0e5138",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#eee7dc",
                    "tertiary": "#00452d",
                    "surface-dim": "#e0d9ce",
                    "primary-container": "#8b3a0f",
                    "on-secondary-container": "#795635",
                    "on-primary-fixed": "#360f00",
                    "surface-tint": "#9a451a",
                    "primary": "#6a2600",
                    "inverse-on-surface": "#f7f0e5",
                    "on-background": "#1e1b15",
                    "surface-container": "#f4ede2",
                    "tertiary-container": "#1e5d43",
                    "on-error-container": "#93000a",
                    "background": "#fff8f0",
                    "outline-variant": "#dcc1b7",
                    "tertiary-fixed": "#b1f0ce",
                    "surface": "#fff8f0",
                    "on-tertiary-container": "#95d4b3",
                    "on-primary-fixed-variant": "#7b2f03",
                    "on-surface": "#1e1b15",
                    "on-secondary-fixed": "#2d1600",
                    "on-primary-container": "#ffb596",
                    "surface-variant": "#e8e2d7",
                    "primary-fixed-dim": "#ffb596",
                    "on-surface-variant": "#55433b",
                    "inverse-surface": "#333029"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Noto Serif", "serif"],
                    "body": ["Plus Jakarta Sans", "sans-serif"],
                    "label": ["Plus Jakarta Sans", "sans-serif"],
                    "serif": ["Playfair Display", "serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .baked-gradient {
        background: linear-gradient(135deg, #6a2600 0%, #8b3a0f 100%);
      }
      .glass-effect {
        backdrop-filter: blur(20px);
        background-color: rgba(255, 248, 240, 0.8);
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #fff8f0;
      }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center bg-surface relative overflow-hidden">
<!-- Decorative Organic Shapes for Background Texture -->
<div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-secondary-container/20 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-primary-fixed/30 rounded-full blur-3xl"></div>
<main class="w-full max-w-md px-6 z-10">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-surface-container-highest mb-6 shadow-sm shadow-primary/5">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">bakery_dining</span>
</div>
<h1 class="font-serif text-5xl font-extrabold text-primary mb-2 tracking-tight">El Vuelto</h1>
<p class="font-body text-on-surface-variant tracking-wide font-medium uppercase text-xs">Acceso Administrativo de Sucursal</p>
</div>
<!-- Login Container -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-lg shadow-2xl shadow-primary/5">
<form action="#" class="space-y-6" method="POST">
<!-- Field: Correo -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="email">Correo electrónico</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-highest border-none rounded-md focus:ring-0 focus:border-b-2 focus:border-primary placeholder-on-surface-variant/50 transition-all text-on-surface font-medium" id="email" name="email" placeholder="nombre@elvuelto.com" required="" type="email"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-300 group-focus-within:w-full"></div>
</div>
</div>
<!-- Field: Contraseña -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface ml-1" for="password">Contraseña</label>
<div class="relative group">
<input class="w-full px-5 py-4 bg-surface-container-highest border-none rounded-md focus:ring-0 focus:border-b-2 focus:border-primary placeholder-on-surface-variant/50 transition-all text-on-surface font-medium" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary transition-all duration-300 group-focus-within:w-full"></div>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full baked-gradient text-on-primary font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 hover:scale-[0.98] active:opacity-90 transition-all text-lg tracking-wide" type="submit">
                    Ingresar al Panel
                </button>
</form>
<!-- Secondary Links -->
<div class="mt-8 pt-8 border-t border-outline-variant/30 flex flex-col items-center gap-4">
<a class="text-on-surface-variant hover:text-primary text-sm font-medium transition-colors hover:underline decoration-primary/30 underline-offset-4" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
<div class="flex items-center gap-2">
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<a class="text-on-surface-variant hover:text-primary text-sm font-medium transition-colors flex items-center gap-1.5 group" href="#">
<span class="material-symbols-outlined text-lg">support_agent</span>
                        Soporte técnico
                    </a>
</div>
</div>
</div>
<!-- Footer Accent -->
<p class="mt-10 text-center text-on-surface-variant/60 font-mono text-[10px] uppercase tracking-[0.2em]">
            The Artisan’s Ledger v2.4
        </p>
</main>
<!-- Bottom Decorative Row -->
<div class="fixed bottom-0 left-0 w-full h-1 baked-gradient opacity-30"></div>
<!-- Background Card Mockups (Visual depth only) -->
<div class="hidden lg:block absolute left-20 top-1/2 -translate-y-1/2 w-64 h-80 bg-surface-container shadow-xl rounded-lg -rotate-6 opacity-40">
<div class="p-6 space-y-4">
<div class="w-12 h-12 rounded-full bg-secondary-container"></div>
<div class="h-4 w-3/4 bg-surface-container-highest rounded"></div>
<div class="h-4 w-1/2 bg-surface-container-highest rounded"></div>
</div>
</div>
<div class="hidden lg:block absolute right-20 top-1/2 -translate-y-1/2 w-64 h-80 bg-surface-container-low shadow-xl rounded-lg rotate-6 opacity-40">
<div class="p-6 space-y-4">
<div class="w-12 h-12 rounded-full bg-primary-fixed"></div>
<div class="h-4 w-full bg-surface-container-highest rounded"></div>
<div class="h-20 w-full bg-surface-container-highest rounded-md"></div>
</div>
</div>
</body></html>
